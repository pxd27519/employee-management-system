<!-- src/app/components/employee-form/employee-form.component.html -->
<div class="form-overlay" (click)="onCancel()">
  <div class="form-card" (click)="$event.stopPropagation()">
    <div class="form-header">
      <h3>{{ isEdit ? 'Edit Employee' : 'Add New Employee' }}</h3>
      <button class="btn-close" (click)="onCancel()">✕</button>
    </div>

    <form (ngSubmit)="onSubmit()" #empForm="ngForm">
      <div class="form-grid">
        <div class="form-group">
          <label>First Name *</label>
          <input [(ngModel)]="employee.firstName" name="firstName" required placeholder="First name"/>
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input [(ngModel)]="employee.lastName" name="lastName" required placeholder="Last name"/>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input [(ngModel)]="employee.email" name="email" type="email" required placeholder="Email"/>
        </div>
        <div class="form-group">
          <label>Department *</label>
          <input [(ngModel)]="employee.department" name="department" required placeholder="Department"/>
        </div>
        <div class="form-group">
          <label>Designation *</label>
          <input [(ngModel)]="employee.designation" name="designation" required placeholder="Designation"/>
        </div>
        <div class="form-group">
          <label>Salary *</label>
          <input [(ngModel)]="employee.salary" name="salary" type="number" required placeholder="Salary"/>
        </div>
        <div class="form-group">
          <label>Joining Date *</label>
          <input [(ngModel)]="employee.joiningDate" name="joiningDate" type="date" required/>
        </div>
        <div class="form-group">
          <label>Role *</label>
          <select [(ngModel)]="employee.role" name="role" required>
            <option value="EMPLOYEE">Employee</option>
            <option value="MANAGER">Manager</option>
            <option value="ADMIN">Admin</option>
          </select>
        </div>
      </div>

      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn-save" [disabled]="empForm.invalid || loading">
          {{ loading ? 'Saving...' : (isEdit ? 'Update' : 'Add Employee') }}
        </button>
      </div>
    </form>
  </div>
</div>
